# =============================================================================
# MACTS - Ana docker-compose.yml
# =============================================================================
# Tüm bağımlı servisler (Redis, Kafka, Postgres, InfluxDB, MLflow, MinIO,
# Grafana, Prometheus) ve 13 MACTS agent'ı.
#
# Kullanım:
#   docker compose up -d                     # Default: testnet mod overlay'i ile
#   docker compose -f docker-compose.yml -f docker-compose.paper.yml up -d
#   docker compose -f docker-compose.yml -f docker-compose.live.yml up -d
# =============================================================================

x-agent-base: &agent-base
  image: macts/agent:${MACTS_IMAGE_TAG:-latest}
  env_file: .env
  environment:
    PYTHONUNBUFFERED: "1"
    LOG_LEVEL: ${LOG_LEVEL:-INFO}
  volumes:
    - ./config:/app/config:ro
    - macts-data:/app/data
    - macts-logs:/app/logs
  restart: unless-stopped
  networks:
    - macts-net
  depends_on:
    redis:
      condition: service_healthy
    kafka:
      condition: service_healthy
    postgres:
      condition: service_healthy
    influxdb:
      condition: service_healthy

services:
  # =========================================================================
  # Altyapı Servisleri
  # =========================================================================

  redis:
    image: redis:7-alpine
    container_name: macts-redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-}
      --maxmemory 2gb
      --maxmemory-policy allkeys-lru
      --save "300 100"
      --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - macts-net

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: macts-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data
      - zookeeper-log:/var/lib/zookeeper/log
    networks:
      - macts-net

  kafka:
    init: true
    image: confluentinc/cp-kafka:7.5.0
    container_name: macts-kafka
    restart: unless-stopped
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: "zookeeper:2181"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 168
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    volumes:
      - kafka-data:/var/lib/kafka/data
    networks:
      - macts-net

  postgres:
    image: postgres:16-alpine
    container_name: macts-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-macts}
      POSTGRES_USER: ${POSTGRES_USER:-macts_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/init_db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-macts_user} -d ${POSTGRES_DB:-macts}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - macts-net

  influxdb:
    image: influxdb:2.7
    container_name: macts-influxdb
    restart: unless-stopped
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: ${INFLUXDB_USERNAME:-admin}
      DOCKER_INFLUXDB_INIT_PASSWORD: ${INFLUXDB_PASSWORD:-changeme}
      DOCKER_INFLUXDB_INIT_ORG: ${INFLUXDB_ORG:-gazifintech}
      DOCKER_INFLUXDB_INIT_BUCKET: ${INFLUXDB_BUCKET:-macts_market_data}
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: ${INFLUXDB_TOKEN}
    ports:
      - "8086:8086"
    volumes:
      - influxdb-data:/var/lib/influxdb2
      - influxdb-config:/etc/influxdb2
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8086/health"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - macts-net

  minio:
    image: minio/minio:latest
    container_name: macts-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-macts_admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-changeme}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - macts-net

  mlflow:
    build:
      context: .
      dockerfile: docker/Dockerfile.mlflow
    image: macts/mlflow:latest
    container_name: macts-mlflow
    restart: unless-stopped
    depends_on:
      - postgres
      - minio
    ports:
      - "5000:5000"
    environment:
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-macts_admin}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-changeme}
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri postgresql://${POSTGRES_USER:-macts_user}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/mlflow
      --default-artifact-root s3://macts-models/
    networks:
      - macts-net

  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: macts-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
    networks:
      - macts-net

  grafana:
    image: grafana/grafana:10.2.2
    container_name: macts-grafana
    restart: unless-stopped
    depends_on:
      - prometheus
      - influxdb
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      INFLUXDB_TOKEN: ${INFLUXDB_TOKEN}
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    networks:
      - macts-net

  # =========================================================================
  # MACTS Agent'ları (13 adet)
  # =========================================================================

  agent-market-scanner:
    <<: *agent-base
    build:
      context: .
      dockerfile: docker/Dockerfile.agent
    container_name: macts-agent-market-scanner
    environment:
      AGENT_NAME: market_scanner
  agent-data-collection:
    <<: *agent-base
    container_name: macts-agent-data-collection
    environment:
      AGENT_NAME: data_collection
    depends_on:
      - redis
      - kafka
      - influxdb
      - agent-market-scanner

  agent-feature-engineering:
    <<: *agent-base
    container_name: macts-agent-feature-engineering
    environment:
      AGENT_NAME: feature_engineering

  agent-per-coin-learning:
    <<: *agent-base
    container_name: macts-agent-per-coin-learning
    environment:
      AGENT_NAME: per_coin_learning
    deploy:
      resources:
        limits:
          memory: 8G

  agent-risk-management:
    <<: *agent-base
    container_name: macts-agent-risk-management
    environment:
      AGENT_NAME: risk_management

  agent-signal-generation:
    <<: *agent-base
    container_name: macts-agent-signal-generation
    environment:
      AGENT_NAME: signal_generation

  agent-execution:
    <<: *agent-base
    container_name: macts-agent-execution
    environment:
      AGENT_NAME: execution

  agent-simulation:
    <<: *agent-base
    container_name: macts-agent-simulation
    environment:
      AGENT_NAME: simulation

  agent-portfolio-manager:
    <<: *agent-base
    container_name: macts-agent-portfolio-manager
    environment:
      AGENT_NAME: portfolio_manager

  agent-monitoring:
    <<: *agent-base
    container_name: macts-agent-monitoring
    environment:
      AGENT_NAME: monitoring
    ports:
      - "8000:8000"   # Prometheus /metrics

  agent-backtesting:
    <<: *agent-base
    container_name: macts-agent-backtesting
    environment:
      AGENT_NAME: backtesting
    profiles:
      - on-demand   # Default'ta başlatılmaz, manuel tetiklenir

  agent-model-registry:
    <<: *agent-base
    container_name: macts-agent-model-registry
    environment:
      AGENT_NAME: model_registry

  agent-circuit-breaker:
    <<: *agent-base
    container_name: macts-agent-circuit-breaker
    environment:
      AGENT_NAME: circuit_breaker

  # Faz B: ML-Filtered Grid Trading (paper mode başlangıçta)
  agent-grid-bot:
    <<: *agent-base
    container_name: macts-agent-grid-bot
    environment:
      AGENT_NAME: grid_bot
      MACTS_MODE: paper
    deploy:
      resources:
        limits:
          memory: 4G

  # Faz 3: AI Analyst (LLM analiz katmanı) — feature flag ile kontrol edilir
  agent-ai-analyst:
    <<: *agent-base
    container_name: macts-agent-ai-analyst
    environment:
      AGENT_NAME: ai_analyst
      ENABLE_AI_ANALYST: ${ENABLE_AI_ANALYST:-false}
      AI_ANALYST_INTERVAL_SECONDS: ${AI_ANALYST_INTERVAL_SECONDS:-900}
      NVIDIA_API_KEY: ${NVIDIA_API_KEY:-}

# =============================================================================
networks:
  macts-net:
    driver: bridge

volumes:
  redis-data:
  kafka-data:
  postgres-data:
  influxdb-data:
  influxdb-config:
  zookeeper-data:
  zookeeper-log:
  minio-data:
  prometheus-data:
  grafana-data:
  macts-data:
  macts-logs:
