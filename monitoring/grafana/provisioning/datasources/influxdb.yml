apiVersion: 1

datasources:
  - name: InfluxDB
    type: influxdb
    access: proxy
    url: http://influxdb:8086
    isDefault: false
    editable: true
    uid: influxdb
    jsonData:
      version: Flux
      organization: gazifintech
      defaultBucket: macts_market_data
      tlsSkipVerify: true
    secureJsonData:
      token: ${INFLUXDB_TOKEN}
