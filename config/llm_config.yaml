# LLM katmanı konfigürasyonu (Faz 3)
# API anahtarı BURAYA YAZILMAZ — .env'deki NVIDIA_API_KEY kullanılır.
# Model ID'leri 5 Tem 2026 canlı probe ile doğrulandı (docs/AI_ANALYST_MODEL_SELECTION.md §8)

base_url: https://integrate.api.nvidia.com/v1
request_timeout_seconds: 90.0
prompt_version: trading_analysis_v1
# A/B: sembol bazında dönüşümlü — karşılaştırma llm_prediction.prompt_version üzerinden
prompt_versions:
#  - trading_analysis_v1  # emekli (11 Tem A-B sonucu: v2 her eksende >= v1)
  - trading_analysis_v2

primary:
  model_id: nvidia/nemotron-3-super-120b-a12b
  max_tokens: 4096        # thinking modelleri için zorunlu taban
  temperature: 0.2

fallback:
  model_id: deepseek-ai/deepseek-v4-pro
  max_tokens: 4096
  temperature: 0.2

rate_limit:
  requests_per_minute: 20   # 30 RPM'de dahi canlıda 429 gözlendi (151/2.5 gün) — pay artırıldı
  requests_per_day: 900     # GERÇEK günlük tavan ~1000 ölçüldü (17-18 Tem: 10 saat 429 duvarı) — altında kal

cache:
  ttl_seconds: 1740         # analiz aralığının (1800s) hemen altı
